version: "2"
linters:
  default: all
  disable:
    - wsl
    - wsl_v5
    - varnamelen
    - paralleltest
    - ireturn
    - depguard
    - lll
    - exhaustruct
    - err113
    - testpackage
    - nlreturn
    - noinlineerr
    - inamedparam
    - funcorder
    - godot
    - mnd
    - wrapcheck
    - dupl
    - embeddedstructfieldcheck
    - noctx
    - nonamedreturns
    - tagliatelle
    - thelper

  settings:
    cyclop:
      max-complexity: 25
    gocognit:
      min-complexity: 40
    funlen:
      lines: 100
      statements: 60

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - funlen
          - cyclop
          - errchkjson
          - gosec
          - nilnil
      - path: mock/
        linters:
          - revive
          - forcetypeassert
          - modernize
          - gocritic
          - staticcheck
          - exhaustruct
          - wsl_v5
      - linters:
          - revive
        text: "context-as-argument"
      - path: revocation\.go
        linters:
          - gosec

formatters:
  enable:
    - gofmt
    - goimports
